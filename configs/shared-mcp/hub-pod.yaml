# Kubernetes Pod Definition for Shared MCP Hub (V5)
# This file is used by podman kube play to deploy the Hub as a persistent Pod.
apiVersion: v1
kind: Pod
metadata:
  name: shared-mcp-pod
  labels:
    app: shared-mcp
spec:
  containers:
  - name: shared-mcp-hub
    image: docker.io/oven/bun:latest
    workingDir: /app/configs/shared-mcp
    command: ["bun", "run", "multiplexer.ts"]
    ports:
    - containerPort: 5115
      hostPort: 5115
    env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "5115"
    - name: HOME
      value: "/root"
    volumeMounts:
    - name: app-code
      mountPath: /app
    - name: home-config
      mountPath: /root/.ai-tools
  volumes:
  - name: app-code
    hostPath:
      path: $REPLACE_WITH_PROJECT_DIR
      type: DirectoryOrCreate
  - name: home-config
    hostPath:
      path: $HOME/.ai-tools
      type: DirectoryOrCreate
