version: '3.8'

services:
  shared-mcp-hub:
    image: docker.io/oven/bun:latest
    container_name: shared-mcp-hub
    working_dir: /app/configs/shared-mcp
    command: bun run multiplexer.ts
    ports:
      - "5115:5115"
    environment:
      - NODE_ENV=production
      - PORT=5115
      - HOME=/root
    volumes:
      - ${PROJECT_DIR}:/app:z
      - ${HOME}/.ai-tools:/root/.ai-tools:z
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
